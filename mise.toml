[tools]
go = "1.26"
golangci-lint = "2"
pre-commit = "latest"

[tasks.test]
description = "Run the test suite"
run = "go test ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format Go sources"
run = "gofmt -w ."

[tasks.coverage]
description = "Report SDK method coverage per API object (writes api-spec/COVERAGE.md)"
run = "go run ./api-spec/coverage"

[tasks.ci]
description = "Everything CI runs"
depends = ["lint", "test"]
