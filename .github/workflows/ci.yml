name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Lint
        run: mise run lint
      - name: Test
        run: mise run test

  # Informational only: reports current SDK method coverage per API object to the
  # job summary of every PR. It never fails the build — a coverage change (e.g. a
  # regenerated snapshot) must not block feature PRs.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Report API coverage
        run: |
          mise run coverage
          cat api-spec/COVERAGE.md >> "$GITHUB_STEP_SUMMARY"
